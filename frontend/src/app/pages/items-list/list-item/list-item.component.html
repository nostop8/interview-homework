<div class="list-item">
    <div class="list-item--image">
        <img [src]="item.imageUrl" alt="warehouse-item-image" />
    </div>
    <div class="list-item--content">
        <span><b>{{ item.name }}</b></span>
        <span>{{ item.description }}</span>
    </div>
    <span>{{ item.quantity }}x</span>
    <span>{{ item.unitPrice | currency : 'EUR' }}</span>
    <button class="button button-primary" (click)="addToShipment.emit()">Add to Shipment</button>
    <button class="button button-small" (click)="onEditItem.emit()" title="Edit Product">Edit</button>
    <button class="button button-small button-danger" (click)="onRemoveItem.emit()" title="Remove Product">X</button>
</div>
