<form [formGroup]="itemForm" (ngSubmit)="onSubmit()" class="product-form">
    <img src="assets/logo_black.svg" width="50" alt="warehouse-item-image" />
    <label class="product-form--name">
        Product Name:
        <input type="text" formControlName="name" />
        <span *ngIf="itemForm.controls.name.invalid && itemForm.controls.name.touched">
            Name is required (min 1 char)
        </span>
    </label>

    <label class="product-form--quantity">
        Quantity:
        <input type="number" formControlName="quantity" />
        <span *ngIf="itemForm.controls.quantity.invalid && itemForm.controls.quantity.touched">
            Cannot be less than 0
        </span>
    </label>

    <label class="product-form--unit-price">
        Price:
        <input type="number" step="0.01" formControlName="unitPrice" />
        <span *ngIf="itemForm.controls.unitPrice.invalid && itemForm.controls.unitPrice.touched">
            Cannot be less than 0
        </span>
    </label>

    <button *ngIf="item" class="button button-small" (click)="onCancel.emit()">Cancel</button>
    <button class="button button-primary" type="submit" [disabled]="itemForm.invalid">
        {{ item ? 'Save Product' : 'Add Product' }}
    </button>
</form>
